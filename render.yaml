services:
  - type: web
    name: its-tarefas
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
    disk:
      name: its-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
