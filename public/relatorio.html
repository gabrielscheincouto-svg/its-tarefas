<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITS - Relat&oacute;rio Mensal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#15181d;color:#FFFFFF;padding:20px;}
.wrap{max-width:1100px;margin:0 auto;}
.toolbar{background:#1e222a;padding:18px;border-radius:14px;margin-bottom:18px;display:flex;gap:12px;align-items:end;flex-wrap:wrap;border:1px solid #363c47;}
.fg{display:flex;flex-direction:column;gap:5px;}
label{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1.2px;}
input,select{padding:10px;background:#262b34;border:1.5px solid #363c47;border-radius:10px;font-size:13px;min-width:150px;color:#FFFFFF;font-family:inherit;}
input:focus,select:focus{outline:none;border-color:#25EAB4;}
.btn{background:#25EAB4;color:#15181d;border:none;padding:11px 22px;border-radius:10px;font-weight:800;cursor:pointer;font-size:13px;text-transform:lowercase;letter-spacing:0.3px;}
.btn.s{background:transparent;color:#25EAB4;border:1.5px solid #25EAB4;}
.rep{background:#1e222a;padding:28px;border-radius:14px;border:1px solid #363c47;}
.rep h1{font-size:22px;margin-bottom:4px;color:#FFFFFF;letter-spacing:-0.3px;}
.rep .monthlbl{font-size:13px;color:#777;margin-bottom:22px;}
.userblock{margin-bottom:30px;padding-bottom:26px;border-bottom:1px solid #363c47;}
.userblock:last-child{border-bottom:none;}
.uhead{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.uav{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#15181d;font-weight:800;font-size:16px;}
.uname{font-size:18px;font-weight:800;color:#FFFFFF;}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
.kpi{background:#262b34;padding:14px;border-radius:10px;border-left:4px solid #25EAB4;border-top:1px solid #363c47;border-right:1px solid #363c47;border-bottom:1px solid #363c47;}
.kpi .n{font-size:24px;font-weight:800;color:#FFFFFF;}
.kpi .l{font-size:11px;color:#888;text-transform:uppercase;font-weight:700;letter-spacing:1px;}
.kpi.green{border-left-color:#25EAB4;}.kpi.green .n{color:#25EAB4;}
.kpi.yellow{border-left-color:#FFB347;}.kpi.yellow .n{color:#FFB347;}
.kpi.red{border-left-color:#FF5C6C;}.kpi.red .n{color:#FF5C6C;}
.kpi.blue{border-left-color:#25EAB4;}.kpi.blue .n{color:#25EAB4;}
.section{margin-top:14px;}
.section h3{font-size:12px;font-weight:800;text-transform:uppercase;color:#888;margin-bottom:8px;letter-spacing:1.2px;}
.tlist{display:flex;flex-direction:column;gap:6px;}
.titem{background:#262b34;padding:10px 14px;border-radius:10px;font-size:12px;border-left:3px solid #363c47;color:#BBBBBB;}
.titem .cl{font-size:10px;color:#25EAB4;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;}
.titem .ti{font-weight:600;margin-top:2px;color:#FFFFFF;}
.titem .dl{font-size:10px;color:#777;margin-top:3px;}
.titem.over{border-left-color:#FF5C6C;}
.titem.done{border-left-color:#25EAB4;}
.titem.ext{border-left-color:#FFB347;}
.ext-reason{color:#FFB347;font-style:italic;margin-top:3px;font-size:11px;}
.empty{color:#777;font-size:12px;padding:10px;text-align:center;}
@media print{
  body{background:#fff;color:#000;padding:0;}
  .toolbar{display:none;}
  .rep,.kpi,.titem,.toolbar{background:#fff!important;color:#000!important;border-color:#ddd!important;}
  .rep h1,.uname,.kpi .n,.titem .ti{color:#000!important;}
  .toolbar{display:none;}
  .rep{box-shadow:none;padding:0;}
  .userblock{page-break-inside:avoid;}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="toolbar">
    <div class="fg"><label>M&ecirc;s</label><input type="month" id="month"></div>
    <div class="fg"><label>Membro (opcional)</label><select id="user"><option value="">Todos</option></select></div>
    <button class="btn" onclick="gen()">Gerar Relat&oacute;rio</button>
    <button class="btn s" onclick="window.print()">&#128424; Imprimir / Salvar PDF</button>
  </div>

  <div class="rep" id="rep">
    <div class="empty">Selecione um m&ecirc;s e clique em "Gerar Relat&oacute;rio"</div>
  </div>
</div>

<script>
let users=[];
async function init(){
  const r=await fetch('/api/me');
  if(!r.ok){window.location.href='/login.html';return;}
  const ur=await fetch('/api/users');users=await ur.json();
  const sel=document.getElementById('user');
  users.forEach(u=>{const o=document.createElement('option');o.value=u.id;o.textContent=u.name;sel.appendChild(o);});
  const d=new Date();document.getElementById('month').value=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function ini(n){return(n||'?').split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2);}
function fD(d){return d?new Date(d+'T00:00:00').toLocaleDateString('pt-BR'):'-';}
function esc(s){return(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);}
async function gen(){
  const month=document.getElementById('month').value;
  const user_id=document.getElementById('user').value;
  if(!month){alert('Selecione um m\u00eas');return;}
  const q=new URLSearchParams({month});if(user_id)q.set('user_id',user_id);
  const r=await fetch('/api/reports/monthly?'+q);
  const d=await r.json();
  if(!r.ok){document.getElementById('rep').innerHTML='<div class="empty">'+(d.error||'Erro')+'</div>';return;}
  renderRep(d);
}
function renderRep(d){
  const [y,m]=d.month.split('-');
  const monthName=new Date(Number(y),Number(m)-1,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  let html=`<h1>Relat&oacute;rio Mensal &mdash; ITS Tarefas</h1><div class="monthlbl">${monthName}</div>`;
  if(d.data.length===0){html+='<div class="empty">Sem dados</div>';}
  d.data.forEach(r=>{
    html+=`<div class="userblock">
      <div class="uhead"><div class="uav" style="background:${r.user.color}">${ini(r.user.name)}</div><div class="uname">${esc(r.user.name)}</div></div>
      <div class="kpis">
        <div class="kpi green"><div class="n">${r.completed_count}</div><div class="l">Conclu&iacute;das no m&ecirc;s</div></div>
        <div class="kpi blue"><div class="n">${r.pending_count}</div><div class="l">Pend&ecirc;ncias abertas</div></div>
        <div class="kpi yellow"><div class="n">${r.deadline_extensions_count}</div><div class="l">Prorroga&ccedil;&otilde;es</div></div>
        <div class="kpi red"><div class="n">${r.avg_days_to_complete!==null?r.avg_days_to_complete+'d':'-'}</div><div class="l">Tempo m&eacute;dio</div></div>
      </div>`;
    html+=`<div class="section"><h3>Tarefas Conclu&iacute;das (${r.completed_count})</h3><div class="tlist">`;
    html+=r.completed.length?r.completed.map(t=>`<div class="titem done"><div class="cl">${esc(t.client)}</div><div class="ti">${esc(t.title)}</div><div class="dl">Prazo: ${fD(t.deadline)}</div></div>`).join(''):'<div class="empty">Nenhuma</div>';
    html+=`</div></div>`;
    html+=`<div class="section"><h3>Pend&ecirc;ncias Abertas (${r.pending_count})</h3><div class="tlist">`;
    html+=r.pending.length?r.pending.map(t=>`<div class="titem ${new Date(t.deadline)<new Date()?'over':''}"><div class="cl">${esc(t.client)}</div><div class="ti">${esc(t.title)}</div><div class="dl">Prazo: ${fD(t.deadline)} &bull; ${t.status==='todo'?'A Fazer':'Em Andamento'} &bull; ${t.priority}</div></div>`).join(''):'<div class="empty">Nenhuma</div>';
    html+=`</div></div>`;
    html+=`<div class="section"><h3>Prorroga&ccedil;&otilde;es de Prazo (${r.deadline_extensions_count})</h3><div class="tlist">`;
    html+=r.deadline_extensions.length?r.deadline_extensions.map(e=>`<div class="titem ext"><div class="ti">Tarefa #${e.task_id}: ${esc(e.old)} &rarr; ${esc(e.new)}</div>${e.reason?`<div class="ext-reason">Motivo: ${esc(e.reason)}</div>`:''}<div class="dl">${new Date(e.at).toLocaleString('pt-BR')}</div></div>`).join(''):'<div class="empty">Nenhuma</div>';
    html+=`</div></div></div>`;
  });
  document.getElementById('rep').innerHTML=html;
}
init();
</script>
</body>
</html>
