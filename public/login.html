<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITS Tarefas - Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;background:#0d0d0d;min-height:100vh;display:flex;align-items:center;justify-content:center;color:#F7F7F7;position:relative;overflow:hidden;}
  body::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top,rgba(37,234,180,0.08),transparent 50%),radial-gradient(ellipse at bottom left,rgba(37,234,180,0.05),transparent 50%);pointer-events:none;}
  .login-box{background:#181818;border:1px solid #2b2b2b;border-radius:20px;padding:48px 40px;width:420px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,0.6);text-align:center;position:relative;z-index:1;}
  .logo-icon{width:64px;height:64px;background:#25EAB4;border-radius:16px;display:inline-flex;align-items:center;justify-content:center;color:#0d0d0d;font-size:22px;font-weight:900;margin-bottom:18px;letter-spacing:-0.5px;}
  h1{font-size:28px;font-weight:800;color:#F7F7F7;margin-bottom:4px;letter-spacing:-0.5px;}
  .subtitle{font-size:11px;color:#777;margin-bottom:32px;font-weight:600;text-transform:uppercase;letter-spacing:2px;}
  .form-group{margin-bottom:18px;text-align:left;}
  .form-group label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#888;margin-bottom:8px;}
  .form-group input{width:100%;padding:14px 16px;background:#1f1f1f;border:1.5px solid #2b2b2b;border-radius:12px;font-size:14px;font-family:inherit;color:#F7F7F7;outline:none;transition:all 0.15s;}
  .form-group input:focus{border-color:#25EAB4;box-shadow:0 0 0 4px rgba(37,234,180,0.12);}
  .btn-login{width:100%;padding:14px;background:#25EAB4;color:#0d0d0d;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;transition:all 0.15s;margin-top:8px;letter-spacing:0.3px;text-transform:lowercase;}
  .btn-login:hover{background:#2df4c0;transform:translateY(-1px);box-shadow:0 8px 24px rgba(37,234,180,0.25);}
  .btn-login:active{transform:translateY(0);}
  .btn-login:disabled{opacity:.6;cursor:not-allowed;}
  .error-msg{display:none;background:rgba(255,92,108,0.1);border:1.5px solid rgba(255,92,108,0.3);color:#FF5C6C;padding:12px 14px;border-radius:10px;font-size:13px;font-weight:600;margin-bottom:16px;text-align:center;}
  .error-msg.active{display:block;}
</style>
</head>
<body>
  <div class="login-box">
    <div class="logo-icon">ITS</div>
    <h1>ITS Tarefas</h1>
    <p class="subtitle">Tax and Corporate</p>

    <div class="error-msg" id="errorMsg"></div>

    <form onsubmit="doLogin(event)">
      <div class="form-group">
        <label>Usu&aacute;rio</label>
        <input type="text" id="username" placeholder="seu.usuario" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-login" id="btnLogin">entrar</button>
    </form>

  </div>

<script>
fetch('/api/me').then(r=>{if(r.ok) window.location.href='/';});

async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('btnLogin');
  const err = document.getElementById('errorMsg');
  btn.textContent = 'entrando...';
  btn.disabled = true;
  err.classList.remove('active');

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (res.ok) {
      window.location.href = '/';
    } else {
      err.textContent = data.error || 'Erro ao fazer login';
      err.classList.add('active');
    }
  } catch (e) {
    err.textContent = 'Erro de conexao';
    err.classList.add('active');
  }
  btn.textContent = 'entrar';
  btn.disabled = false;
}
</script>
</body>
</html>
