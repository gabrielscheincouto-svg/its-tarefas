<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITS - Meus Chamados</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#f0f2f5;color:#1a1a2e;min-height:100vh;}
.hdr{background:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e1e4ea;}
.logo{display:flex;align-items:center;gap:10px;}
.li{width:38px;height:38px;background:linear-gradient(135deg,#3b5bdb,#7048e8);border-radius:10px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;}
.ln{font-weight:800;font-size:15px;}
.ls{font-size:10px;color:#8b8da3;}
.uinfo{display:flex;align-items:center;gap:10px;}
.uname{font-size:13px;font-weight:700;}
.logout{background:none;border:1px solid #e1e4ea;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;color:#555;}
.wrap{max-width:900px;margin:24px auto;padding:0 16px;}
.card{background:#fff;border-radius:14px;padding:22px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.04);}
.card h2{font-size:16px;margin-bottom:14px;}
.fg{margin-bottom:12px;}
label{display:block;font-size:12px;font-weight:600;margin-bottom:5px;color:#555;}
input,textarea,select{width:100%;padding:11px;border:1.5px solid #e1e4ea;border-radius:9px;font-size:13px;font-family:inherit;}
textarea{min-height:90px;resize:vertical;}
.btn{background:linear-gradient(135deg,#3b5bdb,#7048e8);color:#fff;border:none;padding:12px 20px;border-radius:10px;font-weight:700;cursor:pointer;font-size:13px;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.tks{display:flex;flex-direction:column;gap:10px;}
.tk{background:#f8f9fb;border:1px solid #e1e4ea;border-radius:10px;padding:14px;border-left:4px solid #3b5bdb;}
.tk.aberto{border-left-color:#e67700;}
.tk.em_andamento{border-left-color:#3b5bdb;}
.tk.resolvido{border-left-color:#2b8a3e;}
.tk.fechado{border-left-color:#868e96;opacity:.7;}
.tk-top{display:flex;justify-content:space-between;align-items:start;gap:10px;margin-bottom:6px;}
.tk-sub{font-weight:700;font-size:14px;}
.tk-st{font-size:10px;font-weight:800;padding:4px 10px;border-radius:14px;text-transform:uppercase;background:#edf2ff;color:#3b5bdb;white-space:nowrap;}
.tk-st.aberto{background:#fff9db;color:#e67700;}
.tk-st.resolvido{background:#ebfbee;color:#2b8a3e;}
.tk-st.fechado{background:#f1f3f5;color:#868e96;}
.tk-desc{font-size:12px;color:#555770;margin-bottom:8px;line-height:1.5;}
.tk-resp{background:#fff;padding:10px;border-radius:8px;border:1px solid #e1e4ea;margin-top:8px;font-size:12px;}
.tk-resp strong{display:block;color:#3b5bdb;margin-bottom:4px;}
.tk-date{font-size:10px;color:#8b8da3;margin-top:6px;}
.empty{text-align:center;padding:30px;color:#8b8da3;font-size:13px;}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo"><div class="li">ITS</div><div><div class="ln">Portal do Cliente</div><div class="ls">Meus Chamados</div></div></div>
  <div class="uinfo"><span class="uname" id="uname"></span><button class="logout" onclick="logout()">Sair</button></div>
</div>

<div class="wrap">
  <div class="card">
    <h2>&#128221; Abrir Novo Chamado</h2>
    <div class="fg"><label>Assunto</label><input type="text" id="subj" placeholder="Ex: D&uacute;vida sobre contrato" required></div>
    <div class="fg"><label>Prioridade</label><select id="prio"><option value="normal">Normal</option><option value="alta">Alta</option><option value="urgente">Urgente</option></select></div>
    <div class="fg"><label>Descri&ccedil;&atilde;o</label><textarea id="desc" placeholder="Descreva sua solicita&ccedil;&atilde;o..."></textarea></div>
    <button class="btn" id="btnSend" onclick="sendTicket()">Enviar Chamado</button>
  </div>

  <div class="card">
    <h2>&#128203; Meus Chamados</h2>
    <div class="tks" id="list"></div>
  </div>
</div>

<script>
async function init(){
  const r=await fetch('/api/client/me');
  if(!r.ok){window.location.href='/cliente/login';return;}
  const me=await r.json();
  document.getElementById('uname').textContent=me.name;
  loadTickets();
}
async function loadTickets(){
  const r=await fetch('/api/client/tickets');
  const tks=await r.json();
  const el=document.getElementById('list');
  if(tks.length===0){el.innerHTML='<div class="empty">Nenhum chamado ainda. Abra um acima!</div>';return;}
  el.innerHTML=tks.map(t=>{
    const stLabels={aberto:'Aberto',em_andamento:'Em Andamento',resolvido:'Resolvido',fechado:'Fechado'};
    const d=new Date(t.created_at).toLocaleString('pt-BR');
    return `<div class="tk ${t.status}">
      <div class="tk-top"><div class="tk-sub">${esc(t.subject)}</div><span class="tk-st ${t.status}">${stLabels[t.status]||t.status}</span></div>
      <div class="tk-desc">${esc(t.description)}</div>
      ${t.response?`<div class="tk-resp"><strong>Resposta da equipe:</strong>${esc(t.response)}</div>`:''}
      <div class="tk-date">Criado em ${d} &bull; #${t.id}</div>
    </div>`;
  }).join('');
}
function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);}
async function sendTicket(){
  const subj=document.getElementById('subj').value.trim();
  const desc=document.getElementById('desc').value.trim();
  const prio=document.getElementById('prio').value;
  if(!subj||!desc){alert('Preencha assunto e descri\u00e7\u00e3o');return;}
  const btn=document.getElementById('btnSend');btn.disabled=true;btn.textContent='Enviando...';
  const r=await fetch('/api/client/tickets',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({subject:subj,description:desc,priority:prio})});
  btn.disabled=false;btn.textContent='Enviar Chamado';
  if(r.ok){document.getElementById('subj').value='';document.getElementById('desc').value='';loadTickets();}
  else{const d=await r.json();alert(d.error||'Erro');}
}
async function logout(){await fetch('/api/client/logout',{method:'POST'});window.location.href='/cliente/login';}
init();
</script>
</body>
</html>
