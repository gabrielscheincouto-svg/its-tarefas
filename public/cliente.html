<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITS - Meus Chamados</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#15181d;color:#FFFFFF;min-height:100vh;}
.hdr{background:#1e222a;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #363c47;}
.logo{display:flex;align-items:center;gap:12px;}
.li{width:42px;height:42px;background:#25EAB4;border-radius:12px;color:#15181d;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;}
.ln{font-weight:800;font-size:16px;letter-spacing:-0.3px;}
.ls{font-size:10px;color:#777;text-transform:uppercase;letter-spacing:1.5px;font-weight:600;margin-top:2px;}
.uinfo{display:flex;align-items:center;gap:12px;}
.uname{font-size:13px;font-weight:700;color:#FFFFFF;}
.logout{background:transparent;border:1px solid #363c47;padding:9px 16px;border-radius:10px;cursor:pointer;font-size:12px;font-weight:600;color:#BBBBBB;}
.logout:hover{border-color:#25EAB4;color:#25EAB4;}
.wrap{max-width:900px;margin:28px auto;padding:0 20px;}
.card{background:#1e222a;border:1px solid #363c47;border-radius:16px;padding:26px;margin-bottom:18px;}
.card h2{font-size:15px;margin-bottom:16px;font-weight:700;color:#FFFFFF;letter-spacing:-0.2px;}
.fg{margin-bottom:14px;}
label{display:block;font-size:11px;font-weight:700;margin-bottom:7px;color:#888;text-transform:uppercase;letter-spacing:1.2px;}
input,textarea,select{width:100%;padding:12px;background:#262b34;border:1.5px solid #363c47;border-radius:10px;font-size:13px;font-family:inherit;color:#FFFFFF;}
input:focus,textarea:focus,select:focus{outline:none;border-color:#25EAB4;box-shadow:0 0 0 3px rgba(37,234,180,0.12);}
textarea{min-height:100px;resize:vertical;}
.btn{background:#25EAB4;color:#15181d;border:none;padding:13px 22px;border-radius:11px;font-weight:800;cursor:pointer;font-size:13px;text-transform:lowercase;letter-spacing:0.3px;}
.btn:hover{background:#2df4c0;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.tks{display:flex;flex-direction:column;gap:12px;}
.tk{background:#262b34;border:1px solid #363c47;border-radius:12px;padding:16px;border-left:4px solid #25EAB4;}
.tk.aberto{border-left-color:#FFB347;}
.tk.em_andamento{border-left-color:#25EAB4;}
.tk.resolvido{border-left-color:#25EAB4;}
.tk.fechado{border-left-color:#555;opacity:.6;}
.tk-top{display:flex;justify-content:space-between;align-items:start;gap:10px;margin-bottom:8px;}
.tk-sub{font-weight:700;font-size:14px;color:#FFFFFF;}
.tk-st{font-size:10px;font-weight:800;padding:5px 11px;border-radius:14px;text-transform:uppercase;letter-spacing:0.5px;background:rgba(37,234,180,0.12);color:#25EAB4;white-space:nowrap;}
.tk-st.aberto{background:rgba(255,179,71,0.12);color:#FFB347;}
.tk-st.resolvido{background:rgba(37,234,180,0.12);color:#25EAB4;}
.tk-st.fechado{background:rgba(136,136,136,0.15);color:#888;}
.tk-desc{font-size:12px;color:#BBBBBB;margin-bottom:10px;line-height:1.6;}
.tk-resp{background:#141414;padding:12px;border-radius:9px;border:1px solid #363c47;margin-top:10px;font-size:12px;color:#BBBBBB;line-height:1.5;}
.tk-resp strong{display:block;color:#25EAB4;margin-bottom:5px;text-transform:uppercase;font-size:10px;letter-spacing:1px;}
.tk-date{font-size:10px;color:#666;margin-top:8px;}
.empty{text-align:center;padding:36px;color:#666;font-size:13px;}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo"><div class="li">ITS</div><div><div class="ln">Portal do Cliente</div><div class="ls">Meus Chamados</div></div></div>
  <div class="uinfo"><span class="uname" id="uname"></span><button class="logout" onclick="logout()">Sair</button></div>
</div>

<div class="wrap">
  <div class="card">
    <h2>&#128221; Abrir Novo Chamado</h2>
    <div class="fg"><label>Assunto</label><input type="text" id="subj" placeholder="Ex: D&uacute;vida sobre contrato" required></div>
    <div class="fg"><label>Prioridade</label><select id="prio"><option value="normal">Normal</option><option value="alta">Alta</option><option value="urgente">Urgente</option></select></div>
    <div class="fg"><label>Descri&ccedil;&atilde;o</label><textarea id="desc" placeholder="Descreva sua solicita&ccedil;&atilde;o..."></textarea></div>
    <button class="btn" id="btnSend" onclick="sendTicket()">Enviar Chamado</button>
  </div>

  <div class="card">
    <h2>&#128203; Meus Chamados</h2>
    <div class="tks" id="list"></div>
  </div>
</div>

<script>
async function init(){
  const r=await fetch('/api/client/me');
  if(!r.ok){window.location.href='/cliente/login';return;}
  const me=await r.json();
  document.getElementById('uname').textContent=me.name;
  loadTickets();
}
async function loadTickets(){
  const r=await fetch('/api/client/tickets');
  const tks=await r.json();
  const el=document.getElementById('list');
  if(tks.length===0){el.innerHTML='<div class="empty">Nenhum chamado ainda. Abra um acima!</div>';return;}
  el.innerHTML=tks.map(t=>{
    const stLabels={aberto:'Aberto',em_andamento:'Em Andamento',resolvido:'Resolvido',fechado:'Fechado'};
    const d=new Date(t.created_at).toLocaleString('pt-BR');
    return `<div class="tk ${t.status}">
      <div class="tk-top"><div class="tk-sub">${esc(t.subject)}</div><span class="tk-st ${t.status}">${stLabels[t.status]||t.status}</span></div>
      <div class="tk-desc">${esc(t.description)}</div>
      ${t.response?`<div class="tk-resp"><strong>Resposta da equipe:</strong>${esc(t.response)}</div>`:''}
      <div class="tk-date">Criado em ${d} &bull; #${t.id}</div>
    </div>`;
  }).join('');
}
function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);}
async function sendTicket(){
  const subj=document.getElementById('subj').value.trim();
  const desc=document.getElementById('desc').value.trim();
  const prio=document.getElementById('prio').value;
  if(!subj||!desc){alert('Preencha assunto e descri\u00e7\u00e3o');return;}
  const btn=document.getElementById('btnSend');btn.disabled=true;btn.textContent='Enviando...';
  const r=await fetch('/api/client/tickets',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({subject:subj,description:desc,priority:prio})});
  btn.disabled=false;btn.textContent='Enviar Chamado';
  if(r.ok){document.getElementById('subj').value='';document.getElementById('desc').value='';loadTickets();}
  else{const d=await r.json();alert(d.error||'Erro');}
}
async function logout(){await fetch('/api/client/logout',{method:'POST'});window.location.href='/cliente/login';}
init();
</script>
</body>
</html>
