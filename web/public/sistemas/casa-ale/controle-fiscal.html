<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle Fiscal — Casa Ale</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Inter, system-ui, sans-serif; background: #0A0A0A; color: #fff; padding: 24px; min-height: 100vh; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .header h1 { font-size: 1.5rem; font-weight: 700; }
    .header .badge { background: #00E676; color: #000; font-size: 10px; font-weight: 700; padding: 4px 12px; border-radius: 999px; }
    .card { background: #141414; border: 1px solid #1f1f1f; border-radius: 12px; padding: 24px; margin-bottom: 16px; }
    .label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
    .section-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; }
    .checklist { list-style: none; }
    .checklist li { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #1f1f1f; font-size: 14px; }
    .checklist li:last-child { border-bottom: none; }
    .check { width: 22px; height: 22px; border-radius: 6px; border: 2px solid #333; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
    .check.done { background: #00E676; border-color: #00E676; }
    .check.done::after { content: "\2713"; color: #000; font-size: 14px; font-weight: 700; }
    .check:not(.done):hover { border-color: #00E676; }
    .item-text.done { text-decoration: line-through; color: #666; }
    .status-bar { display: flex; gap: 4px; margin-bottom: 24px; }
    .status-segment { height: 6px; border-radius: 3px; flex: 1; background: #1f1f1f; }
    .status-segment.filled { background: #00E676; }
    .progress-label { font-size: 13px; color: #888; margin-bottom: 8px; }
    .cal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
    .cal-item { background: #1f1f1f; padding: 16px; border-radius: 8px; }
    .cal-item .val { font-size: 1.25rem; font-weight: 700; color: #00E676; margin-top: 4px; }
    @media (max-width: 600px) { body { padding: 16px; } }
  </style>
</head>
<body>
  <div class="header"><h1>Controle Fiscal</h1><span class="badge">CASA ALE</span></div>
  <div class="card">
    <div class="section-title">Obrigações do Mês — Março/2026</div>
    <div class="progress-label" id="progress-label">0 de 6 concluídas</div>
    <div class="status-bar" id="status-bar"></div>
    <ul class="checklist" id="checklist"></ul>
  </div>
  <div class="card">
    <div class="section-title">Calendário Fiscal</div>
    <div class="cal-grid">
      <div class="cal-item"><div class="label">SPED Fiscal</div><div class="val">Dia 15</div></div>
      <div class="cal-item"><div class="label">SPED Contribuições</div><div class="val">Dia 15</div></div>
      <div class="cal-item"><div class="label">DCTFWeb</div><div class="val">Dia 20</div></div>
      <div class="cal-item"><div class="label">EFD-Reinf</div><div class="val">Dia 15</div></div>
    </div>
  </div>
  <script>
    const OBR = [
      { codigo: "SPED_FISCAL", nome: "SPED Fiscal", done: true },
      { codigo: "SPED_CONTRIB", nome: "SPED Contribuições", done: true },
      { codigo: "BALANCETE", nome: "Balancete do mês", done: false },
      { codigo: "DCTFWEB", nome: "DCTFWeb", done: false },
      { codigo: "EFD_REINF", nome: "EFD-Reinf", done: false },
      { codigo: "ESOCIAL", nome: "eSocial", done: false }
    ];
    function render() {
      var c = OBR.filter(function(o){return o.done}).length, t = OBR.length;
      document.getElementById("progress-label").textContent = c+" de "+t+" concluídas";
      document.getElementById("status-bar").innerHTML = OBR.map(function(o){ return '<div class="status-segment '+(o.done?'filled':'')+'"></div>'; }).join("");
      document.getElementById("checklist").innerHTML = OBR.map(function(o,i){ return '<li><div class="check '+(o.done?'done':'')+'" onclick="toggle('+i+')"></div><span class="item-text '+(o.done?'done':'')+'">'+o.nome+'</span></li>'; }).join("");
    }
    function toggle(i) { OBR[i].done = !OBR[i].done; render(); }
    render();
  </script>
</body>
</html>
