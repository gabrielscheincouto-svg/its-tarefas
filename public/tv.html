<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITS - Modo TV</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  :root{--bg:#f0f2f5;--white:#fff;--light:#f8f9fb;--accent:#3b5bdb;--accent-lt:#edf2ff;--green:#2b8a3e;--green-bg:#ebfbee;--green-bd:#b2f2bb;--yellow:#e67700;--yellow-bg:#fff9db;--yellow-bd:#ffe066;--red:#c92a2a;--red-bg:#fff5f5;--red-bd:#ffc9c9;--purple:#7048e8;--text:#1a1a2e;--text2:#555770;--muted:#8b8da3;--border:#e1e4ea;--border-lt:#eceef2;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;}

  .hdr{background:var(--white);border-bottom:1px solid var(--border);padding:14px 36px;display:flex;align-items:center;justify-content:space-between;}
  .hdr-left{display:flex;align-items:center;gap:16px;}
  .logo-icon{width:48px;height:48px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:14px;display:flex;align-items:center;justify-content:center;color:white;font-size:20px;font-weight:900;}
  .logo-t{font-size:24px;font-weight:800;}
  .logo-s{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
  .stats{display:flex;gap:10px;}
  .st{display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:28px;font-size:15px;font-weight:800;}
  .st.red{background:var(--red-bg);color:var(--red);border:2px solid var(--red-bd);}
  .st.yel{background:var(--yellow-bg);color:var(--yellow);border:2px solid var(--yellow-bd);}
  .st.grn{background:var(--green-bg);color:var(--green);border:2px solid var(--green-bd);}
  .st .dot{width:10px;height:10px;border-radius:50%;}
  .st.red .dot{background:var(--red);animation:p 2s infinite;}
  .st.yel .dot{background:var(--yellow);}
  .st.grn .dot{background:var(--green);}
  @keyframes p{0%,100%{transform:scale(1);}50%{transform:scale(1.5);opacity:.4;}}
  .clock-b{text-align:right;}
  .clock{font-size:32px;font-weight:800;font-variant-numeric:tabular-nums;}
  .date{font-size:13px;color:var(--muted);}

  .alert{display:none;background:linear-gradient(90deg,var(--red-bg),#fff0f0);border-bottom:2px solid var(--red-bd);padding:12px 36px;font-size:16px;font-weight:800;color:var(--red);align-items:center;gap:10px;}
  .alert.active{display:flex;}

  .main{display:flex;height:calc(100vh - 74px);}

  /* Summary */
  .sum{width:380px;background:var(--white);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;}
  .sum::-webkit-scrollbar{width:0;}
  .sum-sec{padding:22px 24px;border-bottom:1px solid var(--border-lt);}
  .sh{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .si{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;}
  .si.red{background:var(--red-bg);}
  .si.yel{background:var(--yellow-bg);}
  .si.blu{background:var(--accent-lt);}
  .st2{font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;}
  .st2.red{color:var(--red);}
  .st2.yel{color:var(--yellow);}
  .st2.blu{color:var(--accent);}
  .cnt{margin-left:auto;background:var(--bg);border-radius:20px;padding:3px 12px;font-size:13px;font-weight:800;color:var(--muted);}
  .sc{background:var(--light);border:1px solid var(--border-lt);border-radius:12px;padding:14px 16px;margin-bottom:8px;}
  .sc.over{border-left:6px solid var(--red);background:var(--red-bg);}
  .sc.soon{border-left:6px solid var(--yellow);background:var(--yellow-bg);}
  .sc-cl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--purple);margin-bottom:4px;}
  .sc-ti{font-size:15px;font-weight:800;margin-bottom:8px;line-height:1.3;}
  .sc-m{display:flex;justify-content:space-between;align-items:center;}
  .sc-a{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--text2);}
  .av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:white;}
  .sc-d{font-size:12px;font-weight:800;padding:4px 12px;border-radius:20px;}
  .sc-d.red{background:white;color:var(--red);border:1.5px solid var(--red-bd);}
  .sc-d.yel{background:white;color:var(--yellow);border:1.5px solid var(--yellow-bd);}
  .empty{text-align:center;padding:24px;color:var(--muted);font-size:14px;}
  .empty-i{font-size:30px;display:block;margin-bottom:6px;}

  .tr{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--light);border:1px solid var(--border-lt);border-radius:10px;margin-bottom:6px;}
  .tr-n{font-size:14px;font-weight:700;flex:1;}
  .tb{font-size:11px;font-weight:800;padding:3px 10px;border-radius:16px;min-width:28px;text-align:center;}
  .tb.p{background:var(--accent-lt);color:var(--accent);}
  .tb.d{background:var(--yellow-bg);color:var(--yellow);}
  .tb.o{background:var(--red-bg);color:var(--red);}

  /* Board */
  .board{flex:1;display:flex;gap:18px;padding:20px 28px;overflow-x:auto;}
  .col{flex:1;min-width:300px;background:var(--white);border-radius:16px;border:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
  .ch{padding:16px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-lt);}
  .ctg{display:flex;align-items:center;gap:10px;}
  .ci{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;}
  .ct .ci{background:var(--accent-lt);}
  .cd .ci{background:var(--yellow-bg);}
  .cc .ci{background:var(--green-bg);}
  .ctt{font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;}
  .ct .ctt{color:var(--accent);}
  .cd .ctt{color:var(--yellow);}
  .cc .ctt{color:var(--green);}
  .ccnt{background:var(--bg);border-radius:20px;padding:4px 14px;font-size:15px;font-weight:800;color:var(--text2);}
  .cb{padding:10px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:8px;}
  .cb::-webkit-scrollbar{width:4px;}
  .cb::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

  .card{background:var(--white);border:1.5px solid var(--border-lt);border-radius:12px;padding:14px 16px;}
  .card.venc{border-left:6px solid var(--red);background:var(--red-bg);animation:attn 3s infinite;}
  .card.urg{border-left:6px solid var(--red);background:#fff8f8;}
  .card.atn{border-left:6px solid var(--yellow);background:#fffcf0;}
  @keyframes attn{0%,100%{box-shadow:0 0 0 0 rgba(201,42,42,0);}50%{box-shadow:0 0 0 5px rgba(201,42,42,0.08);}}
  .card-cl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--purple);margin-bottom:4px;}
  .card-ti{font-size:15px;font-weight:700;margin-bottom:10px;line-height:1.3;}
  .card-m{display:flex;align-items:center;justify-content:space-between;}
  .card-a{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--text2);}
  .card-d{font-size:11px;font-weight:800;padding:3px 10px;border-radius:18px;}
  .card-d.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd);}
  .card-d.w{background:var(--yellow-bg);color:var(--yellow);border:1.5px solid var(--yellow-bd);}
  .card-d.u{background:var(--red-bg);color:var(--red);border:1.5px solid var(--red-bd);}
  .card-d.ov{background:var(--red);color:white;}

  .refresh{font-size:10px;color:var(--muted);text-align:center;padding:8px;}

  @media(min-width:1920px){.sum{width:440px;}.card-ti,.sc-ti{font-size:17px;}}
</style>
</head>
<body>

<div class="alert" id="alert"><span style="font-size:18px;">&#9888;&#65039;</span><span id="alertTxt"></span></div>

<div class="hdr">
  <div class="hdr-left">
    <div class="logo-icon">ITS</div>
    <div><div class="logo-t">ITS Tarefas</div><div class="logo-s">Intelig&ecirc;ncia Tribut&aacute;ria e Societ&aacute;ria</div></div>
  </div>
  <div class="stats">
    <div class="st red"><span class="dot"></span><span id="sU">0</span></div>
    <div class="st yel"><span class="dot"></span><span id="sW">0</span></div>
    <div class="st grn"><span class="dot"></span><span id="sD">0</span></div>
  </div>
  <div class="clock-b"><div class="clock" id="clock">00:00</div><div class="date" id="dateD"></div></div>
</div>

<div class="main">
  <div class="sum">
    <div class="sum-sec">
      <div class="sh"><div class="si red">&#128680;</div><span class="st2 red">Tarefas Vencidas</span><span class="cnt" id="oC">0</span></div>
      <div id="sOver"></div>
    </div>
    <div class="sum-sec">
      <div class="sh"><div class="si yel">&#9888;&#65039;</div><span class="st2 yel">Vencem em Breve</span><span class="cnt" id="sCnt">0</span></div>
      <div id="sSoon"></div>
    </div>
    <div class="sum-sec" style="flex:1;">
      <div class="sh"><div class="si blu">&#128101;</div><span class="st2 blu">Carga por S&oacute;cio</span></div>
      <div id="team"></div>
    </div>
    <div class="refresh" id="refr">Atualiza automaticamente a cada 30s</div>
  </div>

  <div class="board">
    <div class="col ct"><div class="ch"><div class="ctg"><div class="ci">&#128203;</div><span class="ctt">A Fazer</span></div><span class="ccnt" id="cT">0</span></div><div class="cb" id="bT"></div></div>
    <div class="col cd"><div class="ch"><div class="ctg"><div class="ci">&#9889;</div><span class="ctt">Em Andamento</span></div><span class="ccnt" id="cD">0</span></div><div class="cb" id="bD"></div></div>
    <div class="col cc"><div class="ch"><div class="ctg"><div class="ci">&#10004;&#65039;</div><span class="ctt">Conclu&iacute;do</span></div><span class="ccnt" id="cC">0</span></div><div class="cb" id="bC"></div></div>
  </div>
</div>

<script>
let tasks=[],members=[];

async function load(){
  try{
    const r=await fetch('/api/tv/tasks');
    const d=await r.json();
    tasks=d.tasks;members=d.members;render();
    document.getElementById('refr').textContent=`Atualizado: ${new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;
  }catch(e){}
}

function dU(d){const t=new Date(d+'T00:00:00'),n=new Date();n.setHours(0,0,0,0);return Math.floor((t-n)/864e5);}
function fD(d){return new Date(d+'T00:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});}
function ini(n){return(n||'?').split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2);}

function render(){
  ['todo','doing','done'].forEach(s=>{
    const el=document.getElementById(s==='todo'?'bT':s==='doing'?'bD':'bC');
    const cn=document.getElementById(s==='todo'?'cT':s==='doing'?'cD':'cC');
    const items=tasks.filter(t=>t.status===s);
    items.sort((a,b)=>{const p={urgente:0,alta:1,normal:2};return p[a.priority]!==p[b.priority]?p[a.priority]-p[b.priority]:new Date(a.deadline)-new Date(b.deadline);});
    cn.textContent=items.length;
    el.innerHTML=items.map(t=>{
      const d=dU(t.deadline),c=t.assignee_color||'#868e96',n=t.assignee_name||'?';
      let dl='ok',dt=fD(t.deadline),cls='';
      if(t.status!=='done'){if(d<0){dl='ov';dt=`-${Math.abs(d)}d`;cls='venc';}else if(d<=2){dl='u';dt=d===0?'HOJE!':d+'d';cls=d===0?'urg':'urg';}else if(d<=5){dl='w';dt=d+'d';cls='atn';}}
      else{dl='ok';dt='\u2713';}
      return`<div class="card ${cls}"><div class="card-cl">${t.client}</div><div class="card-ti">${t.title}</div><div class="card-m"><div class="card-a"><div class="av" style="background:${c}">${ini(n)}</div>${n}</div><span class="card-d ${dl}">${dt}</span></div></div>`;
    }).join('');
  });

  // Summary
  const act=tasks.filter(t=>t.status!=='done');
  const over=act.filter(t=>dU(t.deadline)<0).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
  const soon=act.filter(t=>{const d=dU(t.deadline);return d>=0&&d<=5;}).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
  document.getElementById('oC').textContent=over.length;
  document.getElementById('sCnt').textContent=soon.length;

  document.getElementById('sOver').innerHTML=over.length?over.map(t=>{const c=t.assignee_color||'#868e96',n=t.assignee_name||'?';return`<div class="sc over"><div class="sc-cl">${t.client}</div><div class="sc-ti">${t.title}</div><div class="sc-m"><div class="sc-a"><div class="av" style="background:${c}">${ini(n)}</div>${n}</div><span class="sc-d red">${Math.abs(dU(t.deadline))}d atr\u00e1s</span></div></div>`;}).join(''):'<div class="empty"><span class="empty-i">&#127881;</span>Nenhuma vencida!</div>';

  document.getElementById('sSoon').innerHTML=soon.length?soon.map(t=>{const c=t.assignee_color||'#868e96',n=t.assignee_name||'?',d=dU(t.deadline);return`<div class="sc soon"><div class="sc-cl">${t.client}</div><div class="sc-ti">${t.title}</div><div class="sc-m"><div class="sc-a"><div class="av" style="background:${c}">${ini(n)}</div>${n}</div><span class="sc-d yel">${d===0?'HOJE!':d+'d'}</span></div></div>`;}).join(''):'<div class="empty"><span class="empty-i">&#128077;</span>Tudo tranquilo!</div>';

  document.getElementById('team').innerHTML=members.map(m=>{
    const my=tasks.filter(t=>t.assignee_id===m.id&&t.status!=='done');
    const p=my.filter(t=>t.status==='todo').length,d=my.filter(t=>t.status==='doing').length,o=my.filter(t=>dU(t.deadline)<0).length;
    return`<div class="tr"><div class="av" style="background:${m.color}">${ini(m.name)}</div><div class="tr-n">${m.name}</div><div style="display:flex;gap:4px;">${o?`<span class="tb o">${o}</span>`:''}<span class="tb d">${d}</span><span class="tb p">${p}</span></div></div>`;
  }).join('');

  // Stats
  const o=act.filter(t=>dU(t.deadline)<0).length;
  const n=act.filter(t=>{const d=dU(t.deadline);return d>=0&&d<=3;}).length;
  document.getElementById('sU').textContent=`${o} vencida(s)`;
  document.getElementById('sW').textContent=`${n} pr\u00f3xima(s)`;
  document.getElementById('sD').textContent=`${tasks.filter(t=>t.status==='done').length} feita(s)`;
  const b=document.getElementById('alert');
  if(o>0){b.classList.add('active');document.getElementById('alertTxt').textContent=`ATEN\u00c7\u00c3O: ${o} tarefa(s) vencidas!`;}else b.classList.remove('active');
}

function updateClock(){const n=new Date();document.getElementById('clock').textContent=n.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});document.getElementById('dateD').textContent=n.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});}

updateClock();setInterval(updateClock,30000);
load();setInterval(load,30000);
</script>
</body>
</html>
