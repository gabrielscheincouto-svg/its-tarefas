<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITS Tarefas - Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center;}
  .login-box{background:#fff;border-radius:24px;padding:48px 40px;width:420px;max-width:90vw;box-shadow:0 8px 40px rgba(0,0,0,0.08);text-align:center;}
  .logo-icon{width:64px;height:64px;background:linear-gradient(135deg,#3b5bdb,#7048e8);border-radius:18px;display:inline-flex;align-items:center;justify-content:center;color:white;font-size:24px;font-weight:900;margin-bottom:16px;}
  h1{font-size:26px;font-weight:800;color:#1a1a2e;margin-bottom:4px;}
  .subtitle{font-size:13px;color:#8b8da3;margin-bottom:32px;font-weight:500;}
  .form-group{margin-bottom:18px;text-align:left;}
  .form-group label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#8b8da3;margin-bottom:6px;}
  .form-group input{width:100%;padding:14px 16px;background:#f8f9fb;border:1.5px solid #e1e4ea;border-radius:12px;font-size:15px;font-family:inherit;color:#1a1a2e;outline:none;transition:all 0.15s;}
  .form-group input:focus{border-color:#3b5bdb;box-shadow:0 0 0 4px rgba(59,91,219,0.08);}
  .btn-login{width:100%;padding:14px;background:linear-gradient(135deg,#3b5bdb,#5c7cfa);color:white;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.15s;margin-top:8px;box-shadow:0 4px 16px rgba(59,91,219,0.25);}
  .btn-login:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(59,91,219,0.35);}
  .btn-login:active{transform:translateY(0);}
  .error-msg{display:none;background:#fff5f5;border:1.5px solid #ffc9c9;color:#c92a2a;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;margin-bottom:16px;text-align:center;}
  .error-msg.active{display:block;}
  .tv-link{display:inline-block;margin-top:24px;font-size:13px;color:#8b8da3;text-decoration:none;font-weight:500;}
  .tv-link:hover{color:#3b5bdb;}
</style>
</head>
<body>
  <div class="login-box">
    <div class="logo-icon">ITS</div>
    <h1>ITS Tarefas</h1>
    <p class="subtitle">Intelig&ecirc;ncia Tribut&aacute;ria e Societ&aacute;ria</p>

    <div class="error-msg" id="errorMsg"></div>

    <form onsubmit="doLogin(event)">
      <div class="form-group">
        <label>Usu&aacute;rio</label>
        <input type="text" id="username" placeholder="Seu usuario" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="password" placeholder="Sua senha" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-login" id="btnLogin">Entrar</button>
    </form>

    <a href="/tv" class="tv-link">Abrir modo TV (sem login)</a>
  </div>

<script>
// Check if already logged in
fetch('/api/me').then(r=>{if(r.ok) window.location.href='/';});

async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('btnLogin');
  const err = document.getElementById('errorMsg');
  btn.textContent = 'Entrando...';
  btn.disabled = true;
  err.classList.remove('active');

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (res.ok) {
      window.location.href = '/';
    } else {
      err.textContent = data.error || 'Erro ao fazer login';
      err.classList.add('active');
    }
  } catch (e) {
    err.textContent = 'Erro de conexao';
    err.classList.add('active');
  }
  btn.textContent = 'Entrar';
  btn.disabled = false;
}
</script>
</body>
</html>
