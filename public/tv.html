<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITS — Modo TV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter','Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased;}
html,body{height:100%;overflow:hidden;}
body{background:#f5f5f7;color:#1d1d1f;letter-spacing:-0.015em;}
.app{height:100vh;display:flex;flex-direction:column;}

/* ===== HEADER ===== */
.top{background:#fff;border-bottom:1px solid #e8e8ed;padding:16px 28px;display:flex;align-items:center;gap:22px;box-shadow:0 1px 3px rgba(0,0,0,.03);}
.logo{width:48px;height:48px;background:#1d1d1f;color:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;letter-spacing:0.5px;}
.brand{flex-shrink:0;}
.brand-t{font-size:18px;font-weight:700;letter-spacing:-0.015em;}
.brand-s{font-size:10px;color:#86868b;text-transform:uppercase;letter-spacing:1.5px;font-weight:600;margin-top:2px;}

.counters{display:flex;gap:12px;margin-left:auto;}
.pill{display:inline-flex;align-items:center;gap:10px;padding:10px 18px;border-radius:999px;font-size:14px;font-weight:600;background:#fff;}
.pill-dot{width:10px;height:10px;border-radius:50%;}
.pill.red{background:#fdeceb;color:#c43333;}.pill.red .pill-dot{background:#c43333;}
.pill.orange{background:#fff4dd;color:#8a6500;}.pill.orange .pill-dot{background:#e89100;}
.pill.green{background:#e8f7ec;color:#1a7f3a;}.pill.green .pill-dot{background:#22c55e;}

.clock{text-align:right;flex-shrink:0;}
.clock-time{font-size:30px;font-weight:700;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;line-height:1;}
.clock-date{font-size:11px;color:#86868b;margin-top:4px;letter-spacing:0.2px;}

/* ===== BODY ===== */
.body{flex:1;display:grid;grid-template-columns:1fr 340px;gap:14px;padding:14px;overflow:hidden;min-height:0;}
.main-col{display:flex;flex-direction:column;gap:14px;overflow:hidden;min-height:0;}
.sidebar{display:flex;flex-direction:column;gap:14px;overflow-y:auto;}

/* ===== GRID DE COLABORADORES ===== */
#grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);gap:14px;flex:1;min-height:0;}
.card{background:#fff;border:1px solid #e8e8ed;border-radius:14px;padding:18px 20px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.03);}
.card-head{display:flex;align-items:center;gap:12px;padding-bottom:14px;border-bottom:1px solid #ededf0;margin-bottom:12px;flex-shrink:0;}
.av{width:40px;height:40px;border-radius:10px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;letter-spacing:-0.02em;flex-shrink:0;}
.card-name{flex:1;min-width:0;}
.card-name-t{font-size:15px;font-weight:700;letter-spacing:-0.015em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-name-s{font-size:11px;color:#86868b;margin-top:1px;}
.card-count{font-size:16px;font-weight:700;color:#1d1d1f;background:#f5f5f7;padding:4px 12px;border-radius:999px;min-width:32px;text-align:center;}
.card-tasks{flex:1;overflow:hidden;display:flex;flex-direction:column;gap:8px;}
.tsk{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px dashed #ededf0;font-size:12px;}
.tsk:last-child{border-bottom:none;}
.tsk-title{flex:1;min-width:0;color:#1d1d1f;font-weight:600;font-size:13px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word;}
.tsk-client{font-size:10px;color:#86868b;text-transform:uppercase;letter-spacing:0.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;max-width:110px;align-self:center;}
.tsk-date{background:#e8f7ec;color:#1a7f3a;font-weight:700;padding:3px 8px;border-radius:8px;font-size:10px;white-space:nowrap;flex-shrink:0;align-self:center;}
.tsk-date.over{background:#fdeceb;color:#c43333;}
.tsk-date.soon{background:#fff4dd;color:#8a6500;}
.tsk-bar{width:3px;align-self:stretch;min-height:30px;border-radius:2px;background:#22c55e;flex-shrink:0;}
.tsk.over .tsk-bar{background:#c43333;}
.tsk.soon .tsk-bar{background:#e89100;}
.empty-card{color:#86868b;font-size:12px;text-align:center;padding:18px 0;font-style:italic;}
.page-info{font-size:10px;color:#86868b;text-align:center;padding-top:8px;margin-top:auto;border-top:1px dashed #ededf0;}

/* ===== SIDEBAR PANELS ===== */
.panel{background:#fff;border:1px solid #e8e8ed;border-radius:14px;padding:16px 18px;box-shadow:0 1px 2px rgba(0,0,0,.03);}
.panel-hdr{font-size:10px;color:#86868b;text-transform:uppercase;letter-spacing:1.2px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px;}

/* Calendar */
.cal-title{font-size:14px;font-weight:700;margin-bottom:10px;letter-spacing:-0.01em;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;font-size:11px;}
.cal-dh{text-align:center;font-weight:700;color:#86868b;padding:4px 0;font-size:10px;}
.cal-d{text-align:center;padding:5px 0;border-radius:6px;color:#1d1d1f;font-weight:500;}
.cal-d.off{color:#c7c7cc;}
.cal-d.over{background:#fdeceb;color:#c43333;font-weight:700;}
.cal-d.soon{background:#fff4dd;color:#8a6500;font-weight:700;}
.cal-d.today{background:#1d1d1f;color:#fff;font-weight:700;}

/* Weather */
.wtr{display:flex;align-items:center;gap:12px;}
.wtr-ico{font-size:32px;}
.wtr-temp{font-size:28px;font-weight:700;letter-spacing:-0.02em;}
.wtr-desc{font-size:11px;color:#86868b;}
.wtr-extra{font-size:10px;color:#86868b;margin-top:4px;}
.wtr-fc{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:12px;padding-top:10px;border-top:1px solid #ededf0;}
.wtr-fc-d{text-align:center;font-size:10px;}
.wtr-fc-d-lbl{color:#86868b;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;}
.wtr-fc-d-i{font-size:18px;margin:2px 0;}
.wtr-fc-d-t{font-weight:600;color:#1d1d1f;font-variant-numeric:tabular-nums;}

/* Processos */
.proc-list{display:flex;flex-direction:column;gap:8px;}
.proc-item{padding:10px;background:#f5f5f7;border-radius:8px;border-left:3px solid #3b82f6;}
.proc-item.suspenso{border-left-color:#e89100;}
.proc-num{font-family:'SF Mono',Menlo,monospace;font-size:11px;color:#86868b;font-weight:600;}
.proc-cli{font-size:12px;font-weight:700;margin-top:2px;letter-spacing:-0.01em;}
.proc-info{font-size:10px;color:#86868b;margin-top:3px;display:flex;gap:8px;flex-wrap:wrap;}
.proc-prazo{background:#1d1d1f;color:#fff;padding:2px 7px;border-radius:5px;font-size:9px;font-weight:700;}

@media(max-width:1400px){
  #grid{grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);}
  .body{grid-template-columns:1fr 300px;}
}
@media(max-width:1100px){
  #grid{grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(3,1fr);}
  .body{grid-template-columns:1fr;}
  .sidebar{display:none;}
  .counters{flex-wrap:wrap;}
}
</style>
</head>
<body>
<div class="app">

  <header class="top">
    <div class="logo">ITS</div>
    <div class="brand">
      <div class="brand-t">ITS Tarefas</div>
      <div class="brand-s">Painel de Acompanhamento</div>
    </div>
    <div class="counters">
      <div class="pill red"><span class="pill-dot"></span><span id="sU">0</span> vencida(s)</div>
      <div class="pill orange"><span class="pill-dot"></span><span id="sW">0</span> próxima(s)</div>
      <div class="pill green"><span class="pill-dot"></span><span id="sD">0</span> feita(s)</div>
    </div>
    <div class="clock">
      <div class="clock-time" id="clockTime">--:--</div>
      <div class="clock-date" id="clockDate"></div>
    </div>

  <div class="body">
    <div class="main-col">
      <div id="grid"></div>
    </div>

    <aside class="sidebar">
      <div class="panel">
        <div class="panel-hdr">&#128197; Calendário</div>
        <div class="cal-title" id="calTitle">—</div>
        <div class="cal-grid" id="calGrid"></div>
      </div>

      <div class="panel">
        <div class="panel-hdr">&#9728; Porto Alegre</div>
        <div id="wtr">
          <div class="wtr">
            <div class="wtr-ico" id="wtrIco">—</div>
            <div>
              <div class="wtr-temp" id="wtrTemp">—</div>
              <div class="wtr-desc" id="wtrDesc">Carregando…</div>
              <div class="wtr-extra" id="wtrExtra"></div>
            </div>
          </div>
          <div class="wtr-fc" id="wtrFc"></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-hdr">&#9878; Processos Judiciais</div>
        <div class="proc-list" id="procList"><div class="empty-card">Carregando…</div></div>
      </div>
    </aside>
  </div>

</div>

<script>
(async () => { try { if ('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch(e){} document.addEventListener('visibilitychange', async () => { if (document.visibilityState === 'visible' && 'wakeLock' in navigator) { try { await navigator.wakeLock.request('screen'); } catch(e){} } }); const v = document.getElementById('noSleepVid'); if (v) { v.play().catch(()=>{}); setInterval(()=>v.play().catch(()=>{}), 60000); } })();

// ======= TIME =======
function updateClock(){
  const n = new Date();
  const h = String(n.getHours()).padStart(2,'0');
  const m = String(n.getMinutes()).padStart(2,'0');
  document.getElementById('clockTime').textContent = h+':'+m;
  const dias = ['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado'];
  const meses = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  document.getElementById('clockDate').textContent = dias[n.getDay()] + ', ' + n.getDate() + ' de ' + meses[n.getMonth()] + ' de ' + n.getFullYear();
}
updateClock();
setInterval(updateClock, 1000);

// ======= TASKS =======
let tasks=[], members=[];
const COLORS = ['#1d1d1f','#7c5cff','#22c55e','#e89100','#c43333','#3b82f6','#8a5cf6','#ec4899'];

function dU(deadline){
  if(!deadline) return 99;
  const t = new Date(); t.setHours(0,0,0,0);
  const d = new Date(deadline); d.setHours(0,0,0,0);
  return Math.floor((d-t)/86400000);
}
function fmtDate(d){ if(!d) return ''; const dt=new Date(d); return String(dt.getUTCDate()).padStart(2,'0') + '/' + String(dt.getUTCMonth()+1).padStart(2,'0'); }

async function load(){
  try{
    const r = await fetch('/api/tv/tasks');
    const data = await r.json();
    tasks = data.tasks || [];
    members = data.members || [];
    renderGrid();
    renderStats();
    renderCalendar();
  }catch(e){ console.error(e); }
}

function tasksFor(m){ return tasks.filter(t => t.assignee_id === m.id && t.status !== 'done' && t.status !== 'archived').sort((a,b) => dU(a.deadline) - dU(b.deadline)); }

function renderStats(){
  const active = tasks.filter(t => t.status !== 'done' && t.status !== 'archived');
  const over = active.filter(t => dU(t.deadline) < 0).length;
  const soon = active.filter(t => { const d = dU(t.deadline); return d >= 0 && d <= 3; }).length;
  const done = tasks.filter(t => t.status === 'done').length;
  document.getElementById('sU').textContent = over;
  document.getElementById('sW').textContent = soon;
  document.getElementById('sD').textContent = done;
}

function renderGrid(){
  const grid = document.getElementById('grid');
  // Only show members that have active tasks OR are core team (admin). Keep up to 6.
  const list = members.filter(m => m.role !== 'client').slice(0, 6);
  grid.innerHTML = list.map((m, idx) => {
    const my = tasksFor(m);
    const color = m.color || COLORS[idx % COLORS.length];
    const maxTasks = 4;
    const totalPages = Math.max(1, Math.ceil(my.length / maxTasks));
    const curPage = window._taskPage % totalPages || 0;
    const start = curPage * maxTasks;
    const shown = my.slice(start, start + maxTasks);
    const roleText = m.role === 'admin' ? 'Gestão' : 'Colaborador';
    const tasksHtml = shown.length === 0
      ? '<div class="empty-card">Sem pendências!</div>'
      : shown.map(t => {
          const d = dU(t.deadline);
          const cls = d < 0 ? 'over' : (d <= 3 ? 'soon' : '');
          return `<div class="tsk ${cls}">
            <div class="tsk-bar"></div>
            <div class="tsk-title">${escapeHtml(t.title)}</div>
            <div class="tsk-client">${escapeHtml(t.client||'')}</div>
            <div class="tsk-date ${cls}">${fmtDate(t.deadline)}</div>
          </div>`;
        }).join('');
    const moreInfo = totalPages > 1 ? `<div class="page-info">Página ${curPage+1} / ${totalPages} · ${my.length} tarefa(s)</div>` : '';
    return `<div class="card">
      <div class="card-head">
        <div class="av" style="background:${color};">${(m.name||'?').slice(0,1).toUpperCase()}</div>
        <div class="card-name"><div class="card-name-t">${escapeHtml(m.name)}</div><div class="card-name-s">${roleText}</div></div>
        <div class="card-count">${my.length}</div>
      </div>
      <div class="card-tasks">${tasksHtml}</div>
      ${moreInfo}
    </div>`;
  }).join('');
}

// ======= CALENDAR =======
function renderCalendar(){
  const now = new Date();
  const y = now.getFullYear(), mo = now.getMonth();
  const first = new Date(y, mo, 1);
  const lastDay = new Date(y, mo+1, 0).getDate();
  const offset = first.getDay();
  const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  document.getElementById('calTitle').textContent = meses[mo] + ' ' + y;

  // Build deadline map for month
  const deadlineMap = {};
  tasks.forEach(t => {
    if (!t.deadline || t.status === 'done' || t.status === 'archived') return;
    const d = new Date(t.deadline);
    if (d.getUTCFullYear() === y && d.getUTCMonth() === mo) {
      const day = d.getUTCDate();
      const du = dU(t.deadline);
      const cls = du < 0 ? 'over' : (du <= 3 ? 'soon' : 'normal');
      if (!deadlineMap[day] || (cls === 'over')) deadlineMap[day] = cls;
    }
  });

  const dh = ['D','S','T','Q','Q','S','S'];
  let html = dh.map(d => `<div class="cal-dh">${d}</div>`).join('');
  for (let i = 0; i < offset; i++) html += '<div class="cal-d off"></div>';
  for (let d = 1; d <= lastDay; d++) {
    const cls = d === now.getDate() ? 'today' : (deadlineMap[d] || '');
    html += `<div class="cal-d ${cls}">${d}</div>`;
  }
  document.getElementById('calGrid').innerHTML = html;
}

// ======= WEATHER =======
async function loadWeather(){
  try{
    const r = await fetch('/api/weather');
    const d = await r.json();
    const cur = d.current || {};
    const icoMap = {0:'☀',1:'🌤',2:'⛅',3:'☁',45:'🌫',48:'🌫',51:'🌦',53:'🌦',55:'🌦',61:'🌧',63:'🌧',65:'🌧',71:'🌨',73:'🌨',75:'🌨',80:'🌧',81:'🌧',82:'⛈',95:'⛈',96:'⛈',99:'⛈'};
    const descMap = {0:'Céu limpo',1:'Maior parte limpo',2:'Parcialmente nublado',3:'Nublado',45:'Nevoeiro',61:'Chuva leve',63:'Chuva',65:'Chuva forte',80:'Pancadas',95:'Trovoada'};
    const wc = cur.weather_code || 0;
    document.getElementById('wtrIco').textContent = icoMap[wc] || '🌤';
    document.getElementById('wtrTemp').textContent = Math.round(cur.temperature_2m || 0) + '°';
    document.getElementById('wtrDesc').textContent = descMap[wc] || '—';
    document.getElementById('wtrExtra').textContent = 'Umidade ' + (cur.relative_humidity_2m || 0) + '% · Vento ' + Math.round(cur.wind_speed_10m || 0) + ' km/h';
    // Forecast
    const daily = d.daily || {};
    const days = (daily.time || []).slice(1, 5);
    const dns = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
    document.getElementById('wtrFc').innerHTML = days.map((dd, i) => {
      const dt = new Date(dd);
      const code = daily.weather_code ? daily.weather_code[i+1] : 0;
      const tmax = Math.round(daily.temperature_2m_max ? daily.temperature_2m_max[i+1] : 0);
      const tmin = Math.round(daily.temperature_2m_min ? daily.temperature_2m_min[i+1] : 0);
      return `<div class="wtr-fc-d"><div class="wtr-fc-d-lbl">${dns[dt.getUTCDay()]}</div><div class="wtr-fc-d-i">${icoMap[code] || '🌤'}</div><div class="wtr-fc-d-t">${tmax}/${tmin}</div></div>`;
    }).join('');
  }catch(e){ document.getElementById('wtrDesc').textContent = 'Erro ao carregar'; }
}

// ======= PROCESSOS =======
async function loadProcessos(){
  try {
    const r = await fetch('/api/tv/processos');
    const arr = await r.json();
    const el = document.getElementById('procList');
    if (!arr || arr.length === 0) { el.innerHTML = '<div class="empty-card">Nenhum processo ativo</div>'; return; }
    const procPerPage = 5; const procPages = Math.max(1, Math.ceil(arr.length / procPerPage)); const procPage = (window._procPage||0) % procPages; el.innerHTML = arr.slice(procPage*procPerPage, (procPage+1)*procPerPage).map(p => {
      const prazo = p.prazo ? `<span class="proc-prazo">${fmtDate(p.prazo)}</span>` : '';
      return `<div class="proc-item ${p.status||''}">
        <div class="proc-num">${escapeHtml(p.numero||'')}</div>
        <div class="proc-cli">${escapeHtml(p.cliente||'')}</div>
        <div class="proc-info">
          ${p.tipo?`<span>${escapeHtml(p.tipo)}</span>`:''}
          ${p.vara?`<span>· ${escapeHtml(p.vara)}</span>`:''}
          ${prazo}
        </div>
      </div>`;
    }).join('');
  } catch(e) { document.getElementById('procList').innerHTML = '<div class="empty-card">Erro</div>'; }
}

// ======= HELPERS =======
function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }

// ======= INIT =======
load();
loadWeather();
loadProcessos();

// Task/Processo page rotation
window._taskPage = 0;
window._procPage = 0;
setInterval(() => { window._taskPage = (window._taskPage||0) + 1; renderGrid(); }, 15000);
